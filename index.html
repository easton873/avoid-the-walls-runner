<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Avoid the Walls</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Portrait warning (mobile only) -->
  <div id="portrait-overlay">
    <span>&#8635;</span>
    <p>Please rotate your device to landscape mode to play.</p>
  </div>

  <!-- Menu screen -->
  <div id="menu-screen" class="screen active">
    <h1>Avoid the Walls</h1>

    <div class="menu-section">
      <label>Game Mode</label>
      <div class="option-group">
        <button class="option-btn selected" data-mode="best1">Best of 1</button>
        <button class="option-btn" data-mode="best3">Best of 3</button>
        <button class="option-btn" data-mode="endless">Endless</button>
      </div>
    </div>

    <div class="menu-section">
      <label>CPU Opponents</label>
      <div class="option-group">
        <button class="option-btn selected" data-cpu="1">1</button>
        <button class="option-btn" data-cpu="2">2</button>
        <button class="option-btn" data-cpu="3">3</button>
      </div>
    </div>

    <button id="start-btn">Start</button>

    <p style="font-size:0.75rem;color:#444;margin-top:8px;">WASD / arrows to move &nbsp;·&nbsp; Space to boost</p>
  </div>

  <!-- Game screen -->
  <div id="game-screen">
    <canvas id="game-canvas"></canvas>

    <!-- Round over overlay -->
    <div id="round-over-overlay" class="overlay">
      <h2 id="round-over-title">Player wins the round!</h2>
      <p id="round-over-sub">Round 1 of 3</p>
      <p style="font-size:0.75rem;color:#444;">Click to continue</p>
    </div>

    <!-- Game over overlay -->
    <div id="game-over-overlay" class="overlay">
      <h2 id="game-over-title">You win!</h2>
      <div id="score-table" class="score-table"></div>
      <button id="menu-btn" class="overlay-btn">Main Menu</button>
    </div>
  </div>

  <!-- Mobile controls (shown only on touch devices) -->
  <div id="mobile-controls">
    <div id="dpad">
      <div class="dpad-btn" id="dpad-up">&#8593;</div>
      <div class="dpad-btn" id="dpad-left">&#8592;</div>
      <div class="dpad-btn" id="dpad-right">&#8594;</div>
      <div class="dpad-btn" id="dpad-down">&#8595;</div>
    </div>
    <button id="boost-mobile-btn">BOOST</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
